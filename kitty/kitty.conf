# ==========================================
# Fonts
# ==========================================
font_family      Hack Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        16.0

# ==========================================
# Window
# ==========================================
background_opacity 0.8

# ==========================================
# Colors
# ==========================================
foreground #aaaaaa
background #000000

# Normal colors
color0  #202020
color1  #ff6565
color2  #93d44f
color3  #eab93d
color4  #204a87
color5  #ce5c00
color6  #89b6e2
color7  #cccccc

# Bright colors
color8  #606060
color9  #ff8d8d
color10 #c8e7a8
color11 #ffc123
color12 #3465a4
color13 #f57900
color14 #46a4ff
color15 #ffffff

# ==========================================
# Keybindings
# ==========================================
# Clear default Kitty bindings if you want a strict setup (optional)
# clear_all_shortcuts yes

# Shift + F4 sends specific escape sequence
map shift+f4 send_text all \x1b

# ==========================================
# Clipboard for Different Layouts
# ==========================================

# Standard English layout
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Cyrillic layout (Russian/Ukrainian)
# The characters below are Cyrillic 'с' (Es) and 'м' (Em)
map ctrl+shift+с copy_to_clipboard
map ctrl+shift+м paste_from_clipboard
