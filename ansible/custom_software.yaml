---
- name: install custom software
  hosts: new_installation
  become: yes

  tasks:
    - name: add Chrome repository
      ansible.builtin.yum_repository:
        name: google-chrome
        description: google-chrome
        baseurl: "https://dl.google.com/linux/chrome/rpm/stable/x86_64"
        gpgkey: "https://dl.google.com/linux/linux_signing_key.pub"
        gpgcheck: yes
        enabled: yes
        mode: "0644"
        state: present

    - name: install Google Chrome
      ansible.builtin.dnf5:
        name: google-chrome-stable
        state: present
      environment:
        http_proxy: http://127.0.0.1:8888
        https_proxy: http://127.0.0.1:8888

    - name: add Megasync repository
      ansible.builtin.yum_repository:
        name: MEGAsync
        description: MEGAsync
        file: megasync
        baseurl: "https://mega.nz/linux/repo/Fedora_$releasever/"
        gpgkey: "https://mega.nz/linux/repo/Fedora_$releasever/repodata/repomd.xml.key"
        gpgcheck: yes
        enabled: yes
        mode: "0644"
        state: present

    - name: install Megasync
      ansible.builtin.dnf5:
        name: megasync
        state: present
      environment:
        http_proxy: http://127.0.0.1:8888
        https_proxy: http://127.0.0.1:8888

    - name: add Slack repository
      ansible.builtin.yum_repository:
        name: slack
        description: slack
        baseurl: "https://packagecloud.io/slacktechnologies/slack/fedora/21/x86_64"
        gpgkey: "https://packagecloud.io/slacktechnologies/slack/gpgkey"
        enabled: yes
        gpgcheck: no
        repo_gpgcheck: no
        sslcacert: /etc/pki/tls/certs/ca-bundle.crt
        state: present

    - name: install Slack
      ansible.builtin.dnf5:
        name: slack
        state: present
      environment:
        http_proxy: http://127.0.0.1:8888
        https_proxy: http://127.0.0.1:8888

    - name: install Zoom
      ansible.builtin.dnf5:
        name: https://cdn.zoom.us/prod/6.7.5.6891/zoom_x86_64.rpm
        state: present
        disable_gpg_check: yes
      environment:
        http_proxy: http://127.0.0.1:8888
        https_proxy: http://127.0.0.1:8888

    - name: check if keyd is installed
      ansible.builtin.stat:
        path: /usr/local/bin/keyd
      register: keyd

    - name: clone keyd repository
      ansible.builtin.git:
        repo: "https://github.com/rvaiya/keyd"
        dest: /tmp/keyd
        version: "v{{keyd_version}}"
        force: yes
      when: not keyd.stat.exists

    - name: build and install keyd
      ansible.builtin.shell:
        cmd: "make && make install"
        chdir: /tmp/keyd
        creates: /usr/local/bin/keyd
      when: not keyd.stat.exists

    - name: enable keyd service
      ansible.builtin.service:
        name: keyd
        enabled: yes
        state: started
      when: not keyd.stat.exists

    - name: remove keyd source code
      ansible.builtin.file:
        path: /tmp/keyd
        state: absent
      when: not keyd.stat.exists
      become: yes

    - name: swap ffmpeg-free for full ffmpeg
      ansible.builtin.dnf5:
        name: ffmpeg
        state: present
        allowerasing: yes
      environment:
        http_proxy: http://127.0.0.1:8888
        https_proxy: http://127.0.0.1:8888

    - name: check if cliphist is installed
      ansible.builtin.stat:
        path: /usr/local/bin/cliphist
      register: cliphist

    - name: install cliphist
      block:
        - name: get latest cliphist version
          ansible.builtin.uri:
            url: https://api.github.com/repos/sentriz/cliphist/releases/latest
            return_content: true
          register: cliphist_in_github

        - name: install cliphist binary
          ansible.builtin.get_url:
            url: "https://github.com/sentriz/cliphist/releases/download/{{ cliphist_in_github.json.tag_name }}/{{ cliphist_in_github.json.tag_name }}-linux-amd64"
            dest: /usr/local/bin/cliphist
            mode: "0755"
            owner: root
            group: root
      when: not cliphist.stat.exists

    - name: install Stig
      community.general.pipx:
        name: stig
      become: no

    - name: check if Starship is installed
      ansible.builtin.stat:
        path: /usr/local/bin/starship
      register: starship

    - name: install Starship
      ansible.builtin.shell:
        cmd: |
          curl -sS https://starship.rs/install.sh | sh -s -- -y
      when: not starship.stat.exists

    - name: install zsh-vi-mode plugin
      ansible.builtin.git:
        repo: https://github.com/jeffreytse/zsh-vi-mode
        dest: "/home/{{ ansible_user }}/.local/share/zsh/zsh-vi-mode"
        version: master
      become: no

    - name: check if Sugar Candy theme is installed
      ansible.builtin.stat:
        path: /usr/share/sddm/themes/sugar-candy
      register: sugar_candy

    - name: install Sugar Candy theme
      block:
        - name: download and unzip Sugar Candy
          ansible.builtin.unarchive:
            src: https://github.com/Kangie/sddm-sugar-candy/archive/master.zip
            dest: /usr/share/sddm/themes/
            remote_src: yes
            creates: /usr/share/sddm/themes/sddm-sugar-candy-master

        - name: rename Sugar Candy theme directory
          ansible.builtin.command:
            cmd: mv /usr/share/sddm/themes/sddm-sugar-candy-master /usr/share/sddm/themes/sugar-candy
            creates: /usr/share/sddm/themes/sugar-candy

      when: not sugar_candy.stat.exists

    - name: check if Catppuccin theme is installed
      ansible.builtin.stat:
        path: /usr/share/sddm/themes/catppuccin-mocha
      register: catppuccin

    - name: download Catppuccin SDDM
      ansible.builtin.unarchive:
        src: https://github.com/catppuccin/sddm/releases/download/v1.0.0/catppuccin-mocha.zip
        dest: /usr/share/sddm/themes
        remote_src: yes
      when: not catppuccin.stat.exists

    - name: ensure /snap symlink exists
      ansible.builtin.file:
        src: /var/lib/snapd/snap
        dest: /snap
        state: link
        force: yes
      become: yes

    - name: enable and start snapd socket
      ansible.builtin.service:
        name: snapd.socket
        state: started
        enabled: yes

    - name: install Kooha
      community.general.snap:
        name: kooha
        state: present

    - name: install Dbeaver-ce
      community.general.snap:
        name: dbeaver-ce
        state: present
        classic: true

    - name: add Brave repository
      ansible.builtin.yum_repository:
        name: brave-browser
        description: brave-browser
        file: brave-browser
        baseurl: "https://brave-browser-rpm-release.s3.brave.com/$basearch"
        gpgkey: "https://brave-browser-rpm-release.s3.brave.com/brave-core.asc"
        gpgcheck: yes
        enabled: yes
        mode: "0644"
        state: present

    - name: install Brave
      ansible.builtin.dnf5:
        name: brave-browser
        state: present
      environment:
        http_proxy: http://127.0.0.1:8888
        https_proxy: http://127.0.0.1:8888

    - name: add Pritunl repository
      ansible.builtin.yum_repository:
        name: pritunl
        description: Pritunl Stable Repository
        file: pritunl
        baseurl: "https://repo.pritunl.com/stable/yum/fedora/$releasever/"
        gpgkey: "https://raw.githubusercontent.com/pritunl/pgp/master/pritunl_repo_pub.asc"
        gpgcheck: yes
        enabled: yes
        mode: "0644"
        state: present

    - name: install Pritunl
      ansible.builtin.dnf5:
        name: pritunl-client-electron
        state: present
      environment:
        http_proxy: http://127.0.0.1:8888
        https_proxy: http://127.0.0.1:8888

    - name: add flathub remote
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: install Warp
      community.general.flatpak:
        name: app.drey.Warp
        remote: flathub
        state: present

    - name: check if Argocd CLI is installed
      ansible.builtin.stat:
        path: /usr/local/bin/argocd
      register: argocd

    - name: install Argocd CLI tool
      ansible.builtin.get_url:
        url: "https://github.com/argoproj/argo-cd/releases/download/{{ argocd_version }}/argocd-linux-amd64"
        dest: /usr/local/bin/argocd
        mode: "0555"
      become: yes
      when: not argocd.stat.exists

    - name: install repomix tool
      community.general.npm:
        name: repomix
        global: true
        state: present
      become: yes

    - name: install ZapZap (WhatsApp Client)
      community.general.flatpak:
        name: com.rtosta.zapzap
        remote: flathub
        state: present

    - name: get latest kubectx/kubens release info
      ansible.builtin.uri:
        url: https://api.github.com/repos/ahmetb/kubectx/releases/latest
        return_content: true
      register: github_kubectx

    - name: install kubectx binary from GitHub
      ansible.builtin.unarchive:
        src: "https://github.com/ahmetb/kubectx/releases/download/{{ github_kubectx.json.tag_name }}/kubectx_{{ github_kubectx.json.tag_name }}_linux_x86_64.tar.gz"
        dest: /usr/local/bin/
        remote_src: yes
        extra_opts:
          - kubectx
      become: yes

    - name: install kubens binary from GitHub
      ansible.builtin.unarchive:
        src: "https://github.com/ahmetb/kubectx/releases/download/{{ github_kubectx.json.tag_name }}/kubens_{{ github_kubectx.json.tag_name }}_linux_x86_64.tar.gz"
        dest: /usr/local/bin/
        remote_src: yes
        extra_opts:
          - kubens
      become: yes

    - name: get list of current Kubernetes contexts
      ansible.builtin.command: kubectl config get-contexts -o name
      register: kube_contexts
      changed_when: false
      ignore_errors: yes

    - name: rename Kubernetes context to a shorter name
      ansible.builtin.command: kubectx lizachu=kubernetes-admin@kubernetes
      when:
        - kube_contexts.rc == 0
        - "'kubernetes-admin@kubernetes' in kube_contexts.stdout_lines"
